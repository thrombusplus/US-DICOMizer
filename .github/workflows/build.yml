name: Build Windows Executable
permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "US-DICOMizer" US-DICOMizer.py

      - name: Package Release
        run: Compress-Archive -Path dist/US-DICOMizer.exe -DestinationPath US-DICOMizer-Windows.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./US-DICOMizer-Windows.zip
          asset_name: US-DICOMizer-Windows-${{ github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: US-DICOMizer-Windows
          path: ./US-DICOMizer-Windows.zip
