name: Build Windows Executable
permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write VERSION file from release tag
        if: github.event_name == 'release'
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          Set-Content -Path VERSION -Value $ver -NoNewline
          Write-Host "VERSION set to $ver"

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "US-DICOMizer" --icon=icon.ico --add-data "icon.ico;." --add-data "Logo_Blue_Green_small.png;." --add-data "US-DICOMizer_manual.pdf;." --add-data "VERSION;." --hidden-import pydicom --hidden-import pydicom.pixels --hidden-import pydicom.pixels.utils --hidden-import pydicom.pixels.encoders --hidden-import pydicom.pixels.encoders.gdcm --hidden-import pydicom.pixels.encoders.pylibjpeg --hidden-import pydicom.encaps --hidden-import pydicom.uid --hidden-import pydicom.dataelem --hidden-import tkhtmlview --hidden-import tkhtmlview.html_parser --hidden-import tkhtmlview.utils US-DICOMizer.py

      - name: Package Release
        run: Compress-Archive -Path dist/US-DICOMizer.exe -DestinationPath "US-DICOMizer-Windows-$env:GITHUB_REF_NAME.zip"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: US-DICOMizer-Windows-${{ github.ref_name }}.zip

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: US-DICOMizer-Windows
          path: ./US-DICOMizer-Windows-${{ github.ref_name }}.zip
