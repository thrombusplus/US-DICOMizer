name: Build Windows Executable
permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "US-DICOMizer" US-DICOMizer.py

      - name: Package Release
        run: Compress-Archive -Path dist/US-DICOMizer.exe -DestinationPath "US-DICOMizer-Windows-$env:GITHUB_REF_NAME.zip"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: US-DICOMizer-Windows-${{ github.ref_name }}.zip

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: US-DICOMizer-Windows
          path: ./US-DICOMizer-Windows-${{ github.ref_name }}.zip
